<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Tracker</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="index.css">
</head>
<body>

<!-- ═══ HERO ═══ -->
<div class="hero">
  <div class="hero-top">
    <div class="hero-left">
      <div class="hero-suit">♠</div>
      <div>
        <div class="hero-title">Poker Tracker</div>
        <div class="hero-date" id="today-label"></div>
      </div>
    </div>
    <a href="stats.html" class="hero-stats-btn">📊 Stats</a>
  </div>

  <div class="hero-kpis">
    <div class="kpi">
      <div class="kpi-val" id="stat-total">0h</div>
      <div class="kpi-lbl">Esta semana</div>
    </div>
    <div class="kpi-sep"></div>
    <div class="kpi">
      <div class="kpi-val" id="stat-study">0h</div>
      <div class="kpi-lbl">Estudio</div>
    </div>
    <div class="kpi-sep"></div>
    <div class="kpi">
      <div class="kpi-val" id="stat-game">0h</div>
      <div class="kpi-lbl">Grind</div>
    </div>
    <div class="kpi-sep"></div>
    <div class="kpi">
      <div class="kpi-val" id="br-display">€0</div>
      <div class="kpi-lbl">Bankroll</div>
    </div>
  </div>
</div>

<!-- ═══ QUICK NAV ═══ -->
<nav class="qnav-bar">
  <a class="qnav-item" href="registrar.html">
    <div class="qnav-bubble">📝</div>
    <div class="qnav-lbl">Registrar</div>
  </a>
  <a class="qnav-item" href="calendario.html">
    <div class="qnav-bubble">📅</div>
    <div class="qnav-lbl">Horario</div>
  </a>
  <a class="qnav-item" href="habitos.html">
    <div class="qnav-bubble">✅</div>
    <div class="qnav-lbl" id="nav-habitos">Hábitos</div>
  </a>
  <a class="qnav-item" href="clases.html">
    <div class="qnav-bubble">🎓</div>
    <div class="qnav-lbl" id="nav-clases">Clases</div>
  </a>
  <a class="qnav-item" href="bankroll.html">
    <div class="qnav-bubble">💶</div>
    <div class="qnav-lbl">Bankroll</div>
  </a>
  <a class="qnav-item" href="notas.html">
    <div class="qnav-bubble">📓</div>
    <div class="qnav-lbl" id="nav-notas">Notas</div>
  </a>
</nav>

<main>

  <!-- ═══ TODAY SECTION ═══ -->
  <div class="today-header">
    <div class="today-nav">
      <button class="tnav-btn" onclick="shiftDay(-1)">‹</button>
      <div class="tnav-center">
        <span class="tnav-label" id="day-nav-label"></span>
        <button class="tnav-today" id="today-pill" onclick="goToday()" style="display:none">Hoy</button>
      </div>
      <button class="tnav-btn" onclick="shiftDay(1)">›</button>
    </div>
    <div class="day-strip" id="day-strip"></div>
  </div>

  <!-- Plan vs realidad -->
  <div class="pvr-card" id="pvr-card"></div>

  <!-- ═══ WEEK CHART ═══ -->
  <div class="section-row">
    <span class="sec-title">Actividad semanal</span>
    <a href="stats.html" class="see-all">Ver todo →</a>
  </div>
  <div class="chart-card">
    <div class="week-bar" id="week-chart"></div>
    <div class="chart-leg">
      <span class="cleg"><span class="cleg-dot" style="background:#3B8BD4"></span>Estudio</span>
      <span class="cleg"><span class="cleg-dot" style="background:var(--gold)"></span>Coaching</span>
      <span class="cleg"><span class="cleg-dot" style="background:var(--green-d)"></span>Juego</span>
    </div>
  </div>

  <!-- ═══ GOALS ═══ -->
  <div class="section-row">
    <span class="sec-title">Objetivos semana</span>
  </div>
  <div class="goals-card" id="goals-section"></div>

  <!-- ═══ RECENT ═══ -->
  <div class="section-row">
    <span class="sec-title">Últimas sesiones</span>
    <a href="registrar.html" class="see-all">Ver todo →</a>
  </div>
  <div class="recent-card" id="recent-sessions">
    <p class="empty-msg">Sin sesiones aún</p>
  </div>

</main>

<div class="toast" id="toast"></div>
<script src="shared.js"></script>
<script src="index.js"></script>
</body>
</html>
